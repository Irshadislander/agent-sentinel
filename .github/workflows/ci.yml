name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Package
        run: pip install -e .

      - name: Install Dev Tools
        run: pip install pytest ruff mypy requests pyyaml

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src/agent_sentinel || true

      - name: Pytest
        run: pytest -q
