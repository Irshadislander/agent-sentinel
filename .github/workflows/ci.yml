name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Pre-commit
        run: |
          pre-commit run --all-files

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Format (ruff-format)
        run: |
          ruff format --check .

      - name: Tests
        run: |
          pytest -q

  bench:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run benchmark harness
        continue-on-error: true
        run: |
          make bench

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench/results/latest.json
            bench/results/latest.csv
