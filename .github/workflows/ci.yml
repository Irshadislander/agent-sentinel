name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Format (ruff-format)
        run: |
          ruff format --check .

      - name: Tests
        run: |
          pytest -q

      - name: Generate benchmark markdown report
        continue-on-error: true
        run: |
          make bench-report

      - name: Upload benchmark markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-report
          path: |
            docs/bench_report.md
            bench/results/*
          if-no-files-found: warn
